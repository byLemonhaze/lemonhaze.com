<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latch Amount Input</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── LATCH KIT TOKENS ── */
  :root {
    --bg:            #0A0A0A;
    --surface:       rgba(18,18,28,0.95);
    --surface-lo:    rgba(255,255,255,0.04);
    --surface-hi:    rgba(255,255,255,0.08);
    --border:        rgba(255,255,255,0.07);
    --border-hi:     rgba(255,255,255,0.13);
    --accent:        #0F8F7A;
    --accent-bright: rgba(15,200,160,0.95);
    --accent-fill:   rgba(15,143,122,0.18);
    --accent-border: rgba(15,143,122,0.35);
    --accent-glow:   rgba(15,143,122,0.28);
    --text:          rgba(255,255,255,0.92);
    --text-muted:    rgba(255,255,255,0.45);
    --text-dim:      rgba(255,255,255,0.22);
    --r-xl:          24px;
    --r-lg:          18px;
    --r-md:          14px;
    --font:          'Syne', sans-serif;
    --mono:          'Fragment Mono', monospace;
    --frame:         375px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    overflow: hidden;
  }

  /* ── AMBIENT ── */
  .ambient {
    position: fixed;
    left: 50%; bottom: 15%;
    transform: translateX(-50%);
    width: 260px; height: 100px;
    background: radial-gradient(ellipse at center, var(--accent-glow) 0%, transparent 70%);
    filter: blur(28px);
    pointer-events: none;
  }

  /* ── AMOUNT BLOCK ── */
  .amount-block {
    position: relative; z-index: 1;
    width: var(--frame);
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .amount-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-muted);
  }

  .amount-value {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .amount-sym {
    font-family: var(--mono);
    font-size: 20px;
    color: rgba(255,255,255,0.25);
    align-self: flex-start;
    margin-top: 8px;
  }

  .amount-num {
    font-family: var(--mono);
    font-size: 52px;
    font-weight: 400;
    letter-spacing: -2.5px;
    color: var(--text);
    line-height: 1;
  }

  .cursor {
    display: inline-block;
    width: 2px; height: 40px;
    background: var(--accent-bright);
    border-radius: 1px;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  .amount-btc {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }

  /* ── RECIPIENT PILL ── */
  .recipient {
    position: relative; z-index: 1;
    width: var(--frame);
    padding: 0 20px;
  }

  .input-pill {
    width: 100%;
    height: 50px;
    background: var(--surface);
    border: 1px solid var(--accent-border);
    border-radius: 100px;
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px;
    box-shadow:
      0 0 0 1px var(--accent-fill),
      0 0 18px var(--accent-glow);
  }

  .input-pill svg { stroke: var(--accent); flex-shrink: 0; }

  .input-text {
    flex: 1;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    background: transparent;
    border: none; outline: none;
    pointer-events: none;
  }

  /* ── SEND BUTTON ── */
  .send-btn {
    position: relative; z-index: 1;
    width: var(--frame);
    padding: 0 20px;
  }

  .send-btn button {
    width: 100%; height: 54px;
    border-radius: var(--r-lg);
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    font-family: var(--font);
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(0,0,0,0.88);
    overflow: hidden;
    position: relative;
    box-shadow:
      0 8px 28px var(--accent-glow),
      inset 0 1px 0 rgba(255,255,255,0.14);
    transition: transform 0.12s cubic-bezier(0.34,1.2,0.64,1);
  }

  .send-btn button::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 50%;
    border-radius: var(--r-lg) var(--r-lg) 0 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, transparent 100%);
  }

  /* Specular top edge */
  .send-btn button::after {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
  }

  .send-btn button:active { transform: scale(0.97); }

  .send-btn button svg { stroke: rgba(0,0,0,0.72); }

  /* ── LABEL ── */
  .page-label {
    position: fixed; bottom: 20px;
    font-size: 10px; letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim); z-index: 1;
  }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="amount-block">
  <span class="amount-label">You send</span>
  <div class="amount-value">
    <span class="amount-sym">$</span>
    <span class="amount-num">250<span class="cursor"></span></span>
  </div>
  <span class="amount-btc">≈ 0.00256000 BTC</span>
</div>

<div class="recipient">
  <div class="input-pill">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/><line x1="17" y1="17" x2="22" y2="22"/>
    </svg>
    <input class="input-text" type="text" value="Emma L." readonly>
  </div>
</div>

<div class="send-btn">
  <button>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
    </svg>
    Send
  </button>
</div>

<div class="page-label">Amount Input</div>

</body>
</html>
