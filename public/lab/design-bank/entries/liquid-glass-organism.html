<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organism Balance — Liquid Glass</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #07070F;
    overflow: hidden;
    font-family: 'Syne', sans-serif;
    user-select: none;
    cursor: crosshair;
  }

  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  .ui {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }

  .hint {
    position: fixed; bottom: 36px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.09);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">move to attract</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, CX, CY;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ── 1D spring ─────────────────────────────────────────────────
class S {
  constructor(k = 0.07, d = 0.78, v = 0) { this.x = v; this.vel = 0; this.t = v; this.k = k; this.d = d; }
  to(t) { this.t = t; }
  step() { this.vel = (this.vel + (this.t - this.x) * this.k) * this.d; this.x += this.vel; }
}

// ── Morphing blob ─────────────────────────────────────────────
const N       = 11;        // number of blob control points
const BASE_R  = 115;       // base radius px
const AMP_BASE= 22;        // max oscillation amplitude

// Per-point oscillation parameters (slightly different frequencies + phases)
const freqs  = Array.from({length: N}, (_, i) => 0.00045 + i * 0.000055);
const phases = Array.from({length: N}, (_, i) => (2 * Math.PI / N) * i * 1.3);
const amps   = Array.from({length: N}, (_, i) => AMP_BASE * (0.75 + 0.5 * Math.sin(i * 0.77)));

// Organ center — springs so the blob "leans" toward cursor
const ox = new S(0.055, 0.80);
const oy = new S(0.055, 0.80);

// Breath amplitude scale
const breathS = new S(0.04, 0.82, 1);

let mx = -9999, my = -9999;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
document.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });

// ── Catmull-Rom closed path ───────────────────────────────────
function drawBlob(ctx, pts) {
  const n = pts.length;
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 0; i < n; i++) {
    const p0 = pts[(i + n - 1) % n];
    const p1 = pts[i];
    const p2 = pts[(i + 1) % n];
    const p3 = pts[(i + 2) % n];
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
  }
  ctx.closePath();
}

// ── Per-point positions ───────────────────────────────────────
function getPoints(t, bx, by) {
  const pts = [];
  for (let i = 0; i < N; i++) {
    const angle = (2 * Math.PI / N) * i - Math.PI / 2;
    // Organic oscillation
    let r = BASE_R + Math.sin(t * freqs[i] + phases[i]) * amps[i];
    r *= breathS.x;

    // Pseudopod toward mouse: extend points facing cursor
    if (mx > 0) {
      const distCenter = Math.hypot(mx - bx, my - by);
      if (distCenter < 280) {
        const mouseAngle = Math.atan2(my - by, mx - bx);
        let angDiff = angle - mouseAngle;
        while (angDiff > Math.PI)  angDiff -= 2 * Math.PI;
        while (angDiff < -Math.PI) angDiff += 2 * Math.PI;
        const angClose  = Math.max(0, 1 - Math.abs(angDiff) / (Math.PI * 0.55));
        const distFactor = Math.pow(Math.max(0, 1 - distCenter / 280), 1.4);
        r += angClose * distFactor * 42;
      }
    }

    pts.push({ x: bx + r * Math.cos(angle), y: by + r * Math.sin(angle) });
  }
  return pts;
}

// ── Satellite cell ────────────────────────────────────────────
const SAT_R    = 22;
const SAT_ORBIT = 148;
const SAT_SPEED = 0.00038;

// ── Font load guard ───────────────────────────────────────────
document.fonts.ready.then(() => requestAnimationFrame(loop));

function loop(t) {
  // Mouse attraction: blob center drifts toward cursor
  if (mx > 0) {
    const dx = mx - CX, dy = my - CY;
    const dist = Math.hypot(dx, dy);
    if (dist < 300) {
      const f = (1 - dist / 300) * 28;
      ox.to(dx / dist * f);
      oy.to(dy / dist * f);
    } else { ox.to(0); oy.to(0); }
  } else { ox.to(0); oy.to(0); }
  ox.step(); oy.step();

  // Breath — slower pulse
  const breathTarget = 1 + Math.sin(t * 0.00095) * 0.055;
  breathS.to(breathTarget);
  breathS.step();

  const bx = CX + ox.x;
  const by = CY + oy.x;

  ctx.clearRect(0, 0, W, H);

  // ── Deep background ambient glow ──
  const bg = ctx.createRadialGradient(bx, by, 0, bx, by, BASE_R * 2.4);
  bg.addColorStop(0,   'rgba(15,143,122,0.09)');
  bg.addColorStop(0.5, 'rgba(8,80,68,0.05)');
  bg.addColorStop(1,   'transparent');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── Outer halo ──
  const haloR = BASE_R * breathS.x * 1.55;
  const halo  = ctx.createRadialGradient(bx, by, BASE_R * 0.5, bx, by, haloR);
  const haA = 0.06 + 0.04 * Math.sin(t * 0.0014);
  halo.addColorStop(0, `rgba(20,210,165,${haA})`);
  halo.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(bx, by, haloR, 0, Math.PI * 2);
  ctx.fillStyle = halo;
  ctx.fill();

  // ── Blob body ──
  const pts = getPoints(t, bx, by);
  ctx.save();
  ctx.beginPath();
  drawBlob(ctx, pts);

  // body fill: dark membrane + inner glow
  const fill = ctx.createRadialGradient(bx, by - BASE_R * 0.25, 0, bx, by, BASE_R * 1.18);
  fill.addColorStop(0,   'rgba(30,230,175,0.68)');
  fill.addColorStop(0.35,'rgba(18,175,135,0.52)');
  fill.addColorStop(0.72,'rgba(10,100,80,0.28)');
  fill.addColorStop(1,   'rgba(6,40,32,0.10)');
  ctx.fillStyle = fill;
  ctx.fill();

  // membrane edge — subtle brighter rim
  ctx.strokeStyle = `rgba(30,230,175,${0.18 + 0.08 * Math.sin(t * 0.0012)})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  // ── Inner specular highlight ──
  ctx.save();
  ctx.beginPath();
  drawBlob(ctx, pts);
  ctx.clip();
  const spec = ctx.createRadialGradient(bx - BASE_R * 0.28, by - BASE_R * 0.36, 0, bx, by, BASE_R * 0.8);
  spec.addColorStop(0, 'rgba(180,255,235,0.18)');
  spec.addColorStop(1, 'transparent');
  ctx.fillStyle = spec;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // ── Core nucleus pulse ──
  const nucleusR = 38 * breathS.x;
  const nucleus  = ctx.createRadialGradient(bx, by, 0, bx, by, nucleusR);
  const nA = 0.28 + 0.12 * Math.sin(t * 0.0025);
  nucleus.addColorStop(0, `rgba(80,255,200,${nA})`);
  nucleus.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(bx, by, nucleusR, 0, Math.PI * 2);
  ctx.fillStyle = nucleus; ctx.fill();

  // ── Satellite cell ──
  const satAngle = t * SAT_SPEED;
  const sx = bx + Math.cos(satAngle) * SAT_ORBIT;
  const sy = by + Math.sin(satAngle) * SAT_ORBIT * 0.45;
  const satA = 0.5 + 0.2 * Math.sin(t * 0.0018);

  // Tendril connecting satellite to blob
  ctx.beginPath();
  ctx.moveTo(bx + Math.cos(satAngle) * (BASE_R * 0.7), by + Math.sin(satAngle) * (BASE_R * 0.7) * 0.8);
  ctx.lineTo(sx, sy);
  ctx.strokeStyle = `rgba(20,210,165,${satA * 0.18})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Satellite blob
  const satGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, SAT_R * breathS.x);
  satGrad.addColorStop(0, `rgba(25,200,155,${satA * 0.75})`);
  satGrad.addColorStop(1, `rgba(10,100,80,${satA * 0.08})`);
  ctx.beginPath(); ctx.arc(sx, sy, SAT_R * breathS.x, 0, Math.PI * 2);
  ctx.fillStyle = satGrad; ctx.fill();

  // ── Balance text ──
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Shadow / glow for text
  ctx.shadowColor = 'rgba(30,230,175,0.6)';
  ctx.shadowBlur  = 18;

  ctx.font = '700 34px "Fragment Mono", monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fillText('0.002817', bx, by - 8);

  ctx.shadowBlur = 8;
  ctx.font = '700 11px Syne';
  ctx.letterSpacing = '3px';
  ctx.fillStyle = 'rgba(255,255,255,0.42)';
  ctx.fillText('BTC', bx, by + 20);

  ctx.shadowBlur = 0;
  ctx.restore();

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
