<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latch Action Buttons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── LATCH KIT TOKENS ── */
  :root {
    --bg:            #0A0A0A;
    --surface:       rgba(18,18,28,0.95);
    --surface-lo:    rgba(255,255,255,0.04);
    --surface-hi:    rgba(255,255,255,0.08);
    --border:        rgba(255,255,255,0.07);
    --border-hi:     rgba(255,255,255,0.13);
    --accent:        #0F8F7A;
    --accent-bright: rgba(15,200,160,0.95);
    --accent-fill:   rgba(15,143,122,0.18);
    --accent-border: rgba(15,143,122,0.35);
    --accent-glow:   rgba(15,143,122,0.28);
    --text:          rgba(255,255,255,0.92);
    --text-muted:    rgba(255,255,255,0.45);
    --text-dim:      rgba(255,255,255,0.22);
    --r-xl:          24px;
    --r-lg:          18px;
    --r-md:          14px;
    --font:          'Syne', sans-serif;
    --mono:          'Fragment Mono', monospace;
    --frame:         375px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    overflow: hidden;
  }

  /* ── ACTION BUTTON ── */
  .action-btn {
    position: relative;
    width: 335px;
    height: 76px;
    border-radius: var(--r-lg);
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.12s cubic-bezier(0.34, 1.2, 0.64, 1),
                box-shadow 0.18s ease;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.07);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Specular top edge */
  .action-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    border-radius: var(--r-lg) var(--r-lg) 0 0;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.05) 0%,
      transparent 100%
    );
    pointer-events: none;
  }

  .action-btn:active {
    transform: scale(0.97);
    box-shadow: 0 4px 16px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* Send button — teal accent */
  .action-btn.primary {
    background: var(--accent-fill);
    border-color: var(--accent-border);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      0 0 24px var(--accent-glow),
      inset 0 1px 0 rgba(15,200,160,0.15);
  }

  /* ── ICON TILE ── */
  .icon-tile {
    position: relative; z-index: 2;
    width: 42px; height: 42px;
    border-radius: var(--r-md);
    border: 1px solid var(--border-hi);
    background: var(--surface-hi);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .action-btn.primary .icon-tile {
    border-color: var(--accent-border);
    background: var(--accent-fill);
  }

  .icon-tile svg { stroke: var(--text-muted); }
  .action-btn.primary .icon-tile svg { stroke: var(--accent-bright); }

  /* ── BUTTON TEXT ── */
  .btn-text {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; gap: 3px;
  }

  .btn-label {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
  }

  .action-btn.primary .btn-label { color: var(--accent-bright); }

  .btn-sub {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Teal specular on indicator */
  .action-btn.primary::after {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--accent-border) 30%,
      var(--accent-bright) 50%,
      var(--accent-border) 70%,
      transparent 100%
    );
    border-radius: 1px;
  }

  /* ── LABEL ── */
  .page-label {
    margin-top: 6px;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<button class="action-btn primary">
  <div class="icon-tile">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="7" y1="17" x2="17" y2="7"/>
      <polyline points="7 7 17 7 17 17"/>
    </svg>
  </div>
  <div class="btn-text">
    <div class="btn-label">Send</div>
    <div class="btn-sub">Transfer funds</div>
  </div>
</button>

<button class="action-btn">
  <div class="icon-tile">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="17" y1="7" x2="7" y2="17"/>
      <polyline points="17 17 7 17 7 7"/>
    </svg>
  </div>
  <div class="btn-text">
    <div class="btn-label">Receive</div>
    <div class="btn-sub">Request payment</div>
  </div>
</button>

<div class="page-label">Action Buttons</div>

</body>
</html>
