<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latch Balance Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── LATCH KIT TOKENS ── */
  :root {
    --bg:            #0A0A0A;
    --surface:       rgba(18,18,28,0.95);
    --surface-lo:    rgba(255,255,255,0.04);
    --surface-hi:    rgba(255,255,255,0.08);
    --border:        rgba(255,255,255,0.07);
    --border-hi:     rgba(255,255,255,0.13);
    --accent:        #0F8F7A;
    --accent-bright: rgba(15,200,160,0.95);
    --accent-fill:   rgba(15,143,122,0.18);
    --accent-border: rgba(15,143,122,0.35);
    --accent-glow:   rgba(15,143,122,0.28);
    --text:          rgba(255,255,255,0.92);
    --text-muted:    rgba(255,255,255,0.45);
    --text-dim:      rgba(255,255,255,0.22);
    --r-xl:          24px;
    --r-lg:          18px;
    --r-md:          14px;
    --font:          'Syne', sans-serif;
    --mono:          'Fragment Mono', monospace;
    --frame:         375px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    overflow: hidden;
  }

  /* ── AMBIENT ── */
  .ambient {
    position: fixed;
    left: 50%; top: 42%;
    transform: translate(-50%, -50%);
    width: 300px; height: 160px;
    background: radial-gradient(ellipse at center,
      var(--accent-glow) 0%, transparent 70%
    );
    filter: blur(36px);
    pointer-events: none;
  }

  /* ── HERO ── */
  .hero {
    position: relative; z-index: 1;
    width: var(--frame);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 0 20px;
  }

  .balance-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .balance-row {
    display: flex;
    align-items: baseline;
    gap: 5px;
    line-height: 1;
  }

  .balance-currency {
    font-family: var(--mono);
    font-size: 22px;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0;
    align-self: flex-start;
    margin-top: 10px;
  }

  .balance-amount {
    font-family: var(--mono);
    font-size: 56px;
    font-weight: 400;
    letter-spacing: -3px;
    color: var(--text);
  }

  .balance-cents {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 400;
    letter-spacing: -1px;
    color: rgba(255,255,255,0.40);
  }

  .balance-denom {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.22);
    text-transform: uppercase;
    margin-left: 4px;
    align-self: flex-end;
    margin-bottom: 6px;
  }

  /* ── CHANGE PILL ── */
  .change-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .change-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: 100px;
    background: var(--accent-fill);
    border: 1px solid var(--accent-border);
  }

  .change-pill svg { stroke: var(--accent-bright); }

  .change-pct {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--accent-bright);
  }

  .sep {
    width: 1px; height: 12px;
    background: var(--border-hi);
  }

  .change-abs {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.2px;
  }

  /* ── BTC ROW ── */
  .btc-row {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btc-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f7931a 0%, #ffb84d 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 7px; font-weight: 800; color: #fff;
    flex-shrink: 0;
  }

  .btc-amount {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }

  /* ── LABEL ── */
  .page-label {
    position: fixed; bottom: 24px;
    font-size: 10px; font-weight: 400;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--text-dim); z-index: 1;
  }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="hero">
  <div class="balance-label">Total Balance</div>

  <div class="balance-row">
    <span class="balance-currency">$</span>
    <span class="balance-amount">12,480</span>
    <span class="balance-cents">.64</span>
    <span class="balance-denom">CAD</span>
  </div>

  <div class="change-row">
    <div class="change-pill">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
      <span class="change-pct">+2.4%</span>
    </div>
    <div class="sep"></div>
    <span class="change-abs">+$294.18 today</span>
  </div>

  <div class="btc-row">
    <div class="btc-dot">₿</div>
    <span class="btc-amount">0.12840000 BTC</span>
  </div>
</div>

<div class="page-label">Balance Hero</div>

</body>
</html>
