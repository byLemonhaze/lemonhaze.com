<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latch Home Screen — Latch</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #D8D2C8;
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
    font-family: 'Syne', sans-serif;
  }

  /* Phone shell */
  .phone {
    width: 390px;
    height: 720px;
    background: #EDE8DF;
    border-radius: 44px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 36px 90px rgba(0,0,0,0.24), 0 2px 0 rgba(255,255,255,0.7) inset;
  }

  /* Content area */
  .content {
    flex: 1;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    padding-bottom: 100px; /* nav clearance */
  }

  /* ── BRAND HEADER ── */
  .brand-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 56px;
    padding-bottom: 4px;
  }

  .badge-wrap {
    width: 34px; height: 34px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .badge-spin {
    position: absolute;
    width: 68px; height: 68px;
    top: -17px; left: -17px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #010B09, #010B09, #010B09, #010B09,
      #010B09, #020E0C, #083D36, #0F6A5E,
      #14A490, #44D4C4, #ffffff,
      #44D4C4, #010B09
    );
    animation: spin 2.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .badge-inner {
    position: absolute;
    top: 2px; left: 2px; right: 2px; bottom: 2px;
    border-radius: 8px;
    background: #EDE8DF;
    display: flex; align-items: center; justify-content: center;
  }

  .latch-wordmark {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(0,0,0,0.82);
  }

  /* ── BALANCE HERO ── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    cursor: pointer;
  }

  .balance-module {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .balance-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.42);
  }

  .balance-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .balance-sym {
    font-family: 'Syne Mono', monospace;
    font-size: 25px;
    color: rgba(0,0,0,0.42);
    align-self: flex-start;
    margin-top: 11px;
  }

  .balance-num {
    font-family: 'Syne Mono', monospace;
    font-size: 66px;
    letter-spacing: -3px;
    color: rgba(0,0,0,0.82);
    line-height: 70px;
    font-variant-numeric: tabular-nums;
  }

  .balance-minor {
    font-size: 41px;
    letter-spacing: -1.5px;
    font-family: 'Syne Mono', monospace;
    color: rgba(0,0,0,0.82);
  }

  .change-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: 100px;
    background: rgba(20,164,144,0.12);
    border: 1px solid rgba(20,164,144,0.28);
    box-shadow: 0 0 14px rgba(20,164,144,0.40);
  }

  .change-pill-text {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #14A490;
    letter-spacing: 0.3px;
  }

  /* Asset rows */
  .asset-row {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.60);
    border: 1px solid rgba(0,0,0,0.12);
  }

  .asset-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .asset-name {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.42);
  }

  .asset-value {
    font-family: 'Syne Mono', monospace;
    font-size: 12px;
    color: rgba(0,0,0,0.42);
    letter-spacing: 0.3px;
    font-variant-numeric: tabular-nums;
  }

  /* ── ACTION BUTTONS ── */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 24px;
    flex-shrink: 0;
  }

  .btn-wrap {
    border-radius: 20px;
    overflow: hidden;
  }

  .btn {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 22px;
    border-radius: 20px;
    position: relative;
    cursor: pointer;
    border: none;
    width: 100%;
    transition: transform 0.12s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-send {
    background: linear-gradient(135deg, #20C4B0 0%, #14A490 40%, #0F8A78 72%, #0A5C4E 100%);
  }

  /* Inner specular sheen */
  .btn-send::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, transparent 50%);
    pointer-events: none;
  }

  .btn-receive {
    background: linear-gradient(180deg, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0.55) 100%);
    border: 1px solid rgba(0,0,0,0.09) !important;
  }

  .btn-receive::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, transparent 50%);
    pointer-events: none;
  }

  .btn-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .btn-label {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1.5px;
  }

  .btn-label-send    { color: rgba(0,0,0,0.78); }
  .btn-label-receive { color: rgba(0,0,0,0.42); }

  .btn-icon {
    width: 38px; height: 38px;
    border-radius: 12px;
    border-width: 1px;
    border-style: solid;
    display: flex; align-items: center; justify-content: center;
  }

  .btn-icon-send    { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.35); }
  .btn-icon-receive { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.09); }

  .btn-icon svg {
    width: 18px; height: 18px;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    height: 52px;
  }

  .nav-glow {
    position: absolute;
    top: -10px; left: -10px;
    width: 72px; height: 72px;
    border-radius: 24px;
    background: rgba(20,164,144,0.04);
    box-shadow: 0 3px 18px rgba(20,164,144,0.55);
    pointer-events: none;
  }

  .nav-pill {
    position: absolute;
    top: 0; left: 0;
    width: 52px; height: 52px;
    border-radius: 15px;
    background: linear-gradient(160deg, rgba(255,255,255,0.98) 0%, rgba(218,222,220,0.94) 100%);
    box-shadow: 0 3px 12px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.9) inset;
    overflow: hidden;
    pointer-events: none;
  }

  .nav-pill::after {
    content: '';
    position: absolute;
    bottom: 5px; left: 13px; right: 13px;
    height: 2px;
    border-radius: 1px;
    background: #14A490;
    opacity: 0.55;
  }

  .nav-pill::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    border-radius: 15px 15px 0 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, transparent 100%);
  }

  .nav-items {
    position: absolute;
    inset: 0;
    display: flex;
    z-index: 2;
  }

  .nav-btn {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border: none; background: none;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-btn svg {
    width: 22px; height: 22px;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s, transform 0.2s;
  }

  .nav-btn.active svg { stroke: #0A5C4E; transform: scale(1.2); }
  .nav-btn:not(.active) svg { stroke: rgba(0,0,0,0.28); }
</style>
</head>
<body>

<div class="phone">
  <div class="content">

    <!-- Brand Header -->
    <div class="brand-header">
      <div class="badge-wrap">
        <div class="badge-spin"></div>
        <div class="badge-inner">
          <svg width="20" height="20" viewBox="0 0 100 100" fill="none">
            <rect x="10" y="10" width="80" height="80" rx="25" fill="none" stroke="rgba(0,0,0,0.82)" stroke-width="6"/>
            <path d="M35 50 C 35 35, 65 35, 65 50 C 65 65, 35 65, 35 50 M 65 50 L 75 50" fill="none" stroke="rgba(0,0,0,0.82)" stroke-width="6" stroke-linecap="round"/>
            <rect x="45" y="45" width="10" height="10" rx="5" fill="rgba(0,0,0,0.82)"/>
          </svg>
        </div>
      </div>
      <span class="latch-wordmark">LATCH</span>
    </div>

    <!-- Balance Hero -->
    <div class="hero" id="hero" onclick="toggleCurrency()">

      <!-- Balance Module -->
      <div class="balance-module">
        <div class="balance-label">Total Balance</div>
        <div class="balance-row" id="balanceRow">
          <span class="balance-sym" id="balSym">$</span>
          <span class="balance-num" id="balMajor">751</span><span class="balance-minor" id="balMinor">.50</span>
        </div>
        <div class="change-pill">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#14A490" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"/>
          </svg>
          <span class="change-pill-text">+2.4% today</span>
        </div>
      </div>

      <!-- BTC Row -->
      <div class="asset-row">
        <div class="asset-left">
          <svg width="18" height="18" viewBox="0 0 32 32" fill="rgba(0,0,0,0.82)">
            <path d="M16 0C7.164 0 0 7.164 0 16s7.164 16 16 16 16-7.164 16-16S24.836 0 16 0zm3.714 17.5c.371.496.571 1.08.557 1.68 0 2.179-2.071 3.254-4.843 3.534v2.286h-1.571v-2.23H12.5v2.23H10.93v-2.286H8v-1.857h1.643c.286 0 .643-.143.643-.571V12.75c0-.357-.286-.536-.643-.536H8v-1.857h2.929v-2.215H12.5v2.215h1.357v-2.215h1.571v2.215c2.643.036 4.786 1 4.786 3.5 0 .929-.357 1.75-.929 2.286.214.036.428.071.643.143h-.214zm-5.357-4.5h-2.143v2.786H14.357c.929 0 1.643-.357 1.643-1.393 0-.893-.643-1.393-1.643-1.393zm.286 6.929h-2.429v3H14.643c1.071 0 1.786-.464 1.786-1.5 0-.929-.643-1.5-1.786-1.5z"/>
          </svg>
          <span class="asset-name">Bitcoin</span>
        </div>
        <span class="asset-value">0.00412 BTC</span>
      </div>

      <!-- USDT Row -->
      <div class="asset-row">
        <div class="asset-left">
          <svg width="18" height="18" viewBox="0 0 2500 2500" fill="rgba(0,0,0,0.82)">
            <circle cx="1250" cy="1250" r="1250" fill="rgba(0,0,0,0.82)"/>
            <path d="M1411 1357c-9 1-54 3-166 3-86 0-148-2-169-3-334-15-583-74-583-145s249-130 583-145v92c21 2 86 5 171 5 104 0 167-4 169-5v-92c333 15 581 74 581 145s-248 130-586 145zm0-315v-82h234v-218H854v218h234v82c-379 17-663 90-663 178s284 161 663 178v567h327v-567c378-17 662-90 662-178s-284-161-636-178z" fill="#EDE8DF"/>
          </svg>
          <span class="asset-name">Tether</span>
        </div>
        <span class="asset-value">269.00 USDT</span>
      </div>

    </div>

    <!-- Action Buttons -->
    <div class="buttons">
      <div class="btn-wrap">
        <button class="btn btn-send">
          <div class="btn-content">
            <span class="btn-label btn-label-send">SEND</span>
            <div class="btn-icon btn-icon-send">
              <svg viewBox="0 0 24 24" stroke="rgba(0,0,0,0.68)">
                <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
              </svg>
            </div>
          </div>
        </button>
      </div>
      <div class="btn-wrap">
        <button class="btn btn-receive">
          <div class="btn-content">
            <span class="btn-label btn-label-receive">RECEIVE</span>
            <div class="btn-icon btn-icon-receive">
              <svg viewBox="0 0 24 24" stroke="rgba(0,0,0,0.42)">
                <line x1="17" y1="7" x2="7" y2="17"/><polyline points="17 17 7 17 7 7"/>
              </svg>
            </div>
          </div>
        </button>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav" id="nav">
    <div class="nav-glow" id="navGlow"></div>
    <div class="nav-pill" id="navPill"></div>
    <div class="nav-items">
      <button class="nav-btn active" onclick="selectTab(0)">
        <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
      </button>
      <button class="nav-btn" onclick="selectTab(1)">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </button>
      <button class="nav-btn" onclick="selectTab(2)">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.41"/></svg>
      </button>
      <button class="nav-btn" onclick="selectTab(3)">
        <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.2" fill="rgba(0,0,0,0.28)" stroke="none"/><circle cx="12" cy="12" r="1.2" fill="rgba(0,0,0,0.28)" stroke="none"/><circle cx="19" cy="12" r="1.2" fill="rgba(0,0,0,0.28)" stroke="none"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
// Currency toggle
let showBtc = false;
const BTC_PRICE = 117102;
const CAD_BALANCE = 751.5;
const BTC_BALANCE = CAD_BALANCE / BTC_PRICE;

function toggleCurrency() {
  showBtc = !showBtc;
  const sym   = document.getElementById('balSym');
  const major = document.getElementById('balMajor');
  const minor = document.getElementById('balMinor');

  if (showBtc) {
    sym.textContent   = '';
    major.textContent = BTC_BALANCE.toFixed(5);
    minor.textContent = '';
    sym.style.fontSize = '18px';
    sym.textContent = '';
    document.getElementById('balanceRow').insertAdjacentHTML('beforeend',
      '<span class="balance-sym" style="font-size:18px;margin-top:18px"> BTC</span>');
  } else {
    sym.textContent   = '$';
    sym.style.fontSize = '25px';
    major.textContent = '751';
    minor.textContent = '.50';
    const btcLabel = document.getElementById('balanceRow').querySelector('[data-btc]');
    if (btcLabel) btcLabel.remove();
  }
}

// Nav pill spring
class Spring {
  constructor(k=280, d=28, m=0.8) { this.k=k; this.d=d; this.m=m; this.pos=0; this.vel=0; this.target=0; this._raf=null; }
  to(t) { this.target=t; if(!this._raf) this._raf=requestAnimationFrame(()=>this._step()); }
  _step() {
    this._raf=null;
    const dt=1/60;
    const F=-this.k*(this.pos-this.target)-this.d*this.vel;
    this.vel+=(F/this.m)*dt; this.pos+=this.vel*dt;
    this._apply();
    if(Math.abs(this.vel)>0.1||Math.abs(this.pos-this.target)>0.1) this._raf=requestAnimationFrame(()=>this._step());
    else { this.pos=this.target; this._apply(); }
  }
  _apply(){}
}

const nav  = document.getElementById('nav');
const pill = document.getElementById('navPill');
const glow = document.getElementById('navGlow');
const btns = document.querySelectorAll('.nav-btn');

const pillSp = new Spring(280,28,0.8);
pillSp._apply = () => {
  pill.style.transform = `translateX(${pillSp.pos}px)`;
  glow.style.transform = `translateX(${pillSp.pos}px)`;
};

function getX(idx) {
  const w = nav.offsetWidth;
  const slot = w/4;
  return idx*slot + slot/2 - 26;
}

function selectTab(idx) {
  btns.forEach((b,i) => b.classList.toggle('active', i===idx));
  pillSp.to(getX(idx));
}

window.addEventListener('load', () => {
  const x = getX(0);
  pillSp.pos = x;
  pill.style.transform = `translateX(${x}px)`;
  glow.style.transform = `translateX(${x}px)`;
});
</script>
</body>
</html>
