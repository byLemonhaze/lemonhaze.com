<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latch Bottom Nav — Latch</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #D8D2C8;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 60px;
    -webkit-font-smoothing: antialiased;
  }

  /* Warm ivory phone slab */
  .slab {
    width: 375px;
    height: 140px;
    background: #EDE8DF;
    border-radius: 32px;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 20px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.18), 0 1px 0 rgba(255,255,255,0.7) inset;
    overflow: visible;
  }

  /* ── NAV CONTAINER ── */
  .nav {
    position: relative;
    width: calc(100% - 40px);
    height: 52px;
    display: flex;
    align-items: center;
  }

  /* ── TEAL GLOW ── */
  .nav-glow {
    position: absolute;
    top: -10px;
    left: -10px;
    width: 72px;
    height: 72px;
    border-radius: 24px;
    background: rgba(20,164,144,0.04);
    box-shadow: 0 3px 18px rgba(20,164,144,0.55);
    pointer-events: none;
    will-change: transform;
  }

  /* ── MORPHING PILL ── */
  .nav-pill {
    position: absolute;
    top: 0; left: 0;
    width: 52px; height: 52px;
    border-radius: 15px;
    background: linear-gradient(160deg, rgba(255,255,255,0.98) 0%, rgba(218,222,220,0.94) 100%);
    box-shadow: 0 3px 12px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.9) inset;
    will-change: transform;
    overflow: hidden;
    pointer-events: none;
  }

  /* Teal accent line inside pill */
  .nav-pill::after {
    content: '';
    position: absolute;
    bottom: 5px;
    left: 13px;
    right: 13px;
    height: 2px;
    border-radius: 1px;
    background: #14A490;
    opacity: 0.55;
  }

  /* Top specular sheen */
  .nav-pill::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    border-radius: 15px 15px 0 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, transparent 100%);
  }

  /* ── ICON BUTTONS ── */
  .nav-items {
    display: flex;
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 2;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-btn-inner {
    display: flex; align-items: center; justify-content: center;
    width: 52px; height: 52px;
    transition: transform 0.15s;
    will-change: transform;
  }

  .nav-btn svg {
    width: 22px; height: 22px;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s;
  }

  .nav-btn.active .nav-btn-inner { transform: scale(1.2); }
  .nav-btn.active svg { stroke: #0A5C4E; }
  .nav-btn:not(.active) svg { stroke: rgba(0,0,0,0.28); }

  /* ── LABEL ── */
  .hint {
    position: absolute;
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.30);
    white-space: nowrap;
    text-align: center;
  }
</style>
</head>
<body>

<div class="slab">
  <p class="hint">Tap to navigate</p>

  <div class="nav" id="nav">
    <div class="nav-glow"  id="glow"></div>
    <div class="nav-pill"  id="pill"></div>

    <div class="nav-items">
      <!-- Home -->
      <button class="nav-btn active" data-idx="0">
        <div class="nav-btn-inner">
          <svg viewBox="0 0 24 24">
            <path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/>
          </svg>
        </div>
      </button>
      <!-- Card -->
      <button class="nav-btn" data-idx="1">
        <div class="nav-btn-inner">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
        </div>
      </button>
      <!-- Activity -->
      <button class="nav-btn" data-idx="2">
        <div class="nav-btn-inner">
          <svg viewBox="0 0 24 24">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.41"/>
          </svg>
        </div>
      </button>
      <!-- More -->
      <button class="nav-btn" data-idx="3">
        <div class="nav-btn-inner">
          <svg viewBox="0 0 24 24">
            <circle cx="5"  cy="12" r="1.2" fill="rgba(0,0,0,0.28)" stroke="none"/>
            <circle cx="12" cy="12" r="1.2" fill="rgba(0,0,0,0.28)" stroke="none"/>
            <circle cx="19" cy="12" r="1.2" fill="rgba(0,0,0,0.28)" stroke="none"/>
          </svg>
        </div>
      </button>
    </div>
  </div>
</div>

<script>
const nav   = document.getElementById('nav');
const pill  = document.getElementById('pill');
const glow  = document.getElementById('glow');
const btns  = document.querySelectorAll('.nav-btn');

// ── Spring class ────────────────────────────────────────────────────────
class Spring {
  constructor(k = 280, d = 28, mass = 0.8) {
    this.k = k; this.d = d; this.mass = mass;
    this.pos = 0; this.vel = 0; this.target = 0;
    this._raf = null;
  }
  to(target) {
    this.target = target;
    if (!this._raf) this._raf = requestAnimationFrame(() => this._step());
  }
  _step() {
    this._raf = null;
    const dt = 1 / 60;
    const F = -this.k * (this.pos - this.target) - this.d * this.vel;
    this.vel += (F / this.mass) * dt;
    this.pos += this.vel * dt;
    this._apply();
    if (Math.abs(this.vel) > 0.1 || Math.abs(this.pos - this.target) > 0.1) {
      this._raf = requestAnimationFrame(() => this._step());
    } else {
      this.pos = this.target;
      this._apply();
    }
  }
  _apply() {}
}

// Pill position spring
const pillSpring = new Spring(280, 28, 0.8);
pillSpring._apply = () => {
  pill.style.transform = `translateX(${pillSpring.pos}px)`;
  glow.style.transform = `translateX(${pillSpring.pos}px)`;
};

// Squash+stretch: separate X/Y springs
class ScaleSpring extends Spring {
  constructor(k, d, m, el, axis) {
    super(k, d, m);
    this.el = el; this.axis = axis; this.pos = 1; this.target = 1;
    this._companion = null;
  }
  _apply() {
    const sx = this.axis === 'x' ? this.pos : (this._companion ? this._companion.pos : 1);
    const sy = this.axis === 'y' ? this.pos : (this._companion ? this._companion.pos : 1);
    this.el.style.transform = `translateX(${pillSpring.pos}px) scaleX(${sx}) scaleY(${sy})`;
    if (this._companion) {
      this._companion.el.style.transform = `translateX(${pillSpring.pos}px) scaleX(${sx}) scaleY(${sy})`;
    }
  }
}

// Stretch X: widens during travel
const stretchX = new Spring(200, 14, 0.8);
stretchX.pos = 1; stretchX.target = 1;
// Splat Y: squishes on arrival
const splatY = new Spring(260, 8, 0.8);
splatY.pos = 1; splatY.target = 1;

function applyPillTransform() {
  pill.style.transform = `translateX(${pillSpring.pos}px) scaleX(${stretchX.pos}) scaleY(${splatY.pos})`;
  glow.style.transform = `translateX(${pillSpring.pos}px)`;
}

// Patch all _apply to use combined transform
pillSpring._apply = applyPillTransform;
stretchX._apply   = applyPillTransform;
splatY._apply     = applyPillTransform;

// Per-icon scale springs
const iconSprings = Array.from(btns).map((btn, i) => {
  const sp = new Spring(340, 14, 0.8);
  sp.pos = i === 0 ? 1.2 : 1.0;
  sp.target = sp.pos;
  sp._apply = () => {
    btn.querySelector('.nav-btn-inner').style.transform = `scale(${sp.pos})`;
  };
  return sp;
});

// Press springs
const pressSprings = Array.from(btns).map((btn, i) => {
  const sp = new Spring(700, 28, 0.8);
  sp.pos = 1; sp.target = 1;
  sp._apply = () => {
    const base = iconSprings[i].pos;
    btn.querySelector('.nav-btn-inner').style.transform = `scale(${base * sp.pos})`;
  };
  return sp;
});

let activeIdx = 0;

function getTargetX(idx) {
  const navW = nav.offsetWidth;
  const slotW = navW / 4;
  return idx * slotW + slotW / 2 - 26;
}

function selectTab(idx) {
  const prevIdx = activeIdx;
  activeIdx = idx;

  btns.forEach((b, i) => {
    b.classList.toggle('active', i === idx);
    iconSprings[i].to(i === idx ? 1.2 : 1.0);
  });

  const targetX = getTargetX(idx);
  const tabDist = Math.abs(idx - prevIdx);
  const maxStretch = 1.35 + tabDist * 0.1;

  pillSpring.to(targetX);

  // Stretch then spring back
  stretchX.pos = maxStretch; stretchX.vel = 0; stretchX.to(1);
  // Delay splat
  setTimeout(() => {
    splatY.pos = 0.76; splatY.vel = 0; splatY.to(1);
  }, 90);
}

// Press feedback
btns.forEach((btn, i) => {
  btn.addEventListener('pointerdown', () => {
    pressSprings[i].to(0.66);
  });
  btn.addEventListener('pointerup', () => {
    pressSprings[i].to(1);
    selectTab(i);
  });
  btn.addEventListener('pointercancel', () => {
    pressSprings[i].to(1);
  });
});

// Init
window.addEventListener('load', () => {
  const x = getTargetX(0);
  pillSpring.pos = x;
  pill.style.transform = `translateX(${x}px)`;
  glow.style.transform = `translateX(${x}px)`;
});
</script>
</body>
</html>
