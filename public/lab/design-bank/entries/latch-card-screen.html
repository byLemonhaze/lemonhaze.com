<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latch Card Screen — Latch</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #D8D2C8;
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
    font-family: 'Syne', sans-serif;
  }

  .phone {
    width: 390px;
    height: 720px;
    background: #EDE8DF;
    border-radius: 44px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 36px 90px rgba(0,0,0,0.24), 0 2px 0 rgba(255,255,255,0.7) inset;
  }

  /* Content scroll area */
  .scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
    padding-bottom: 90px;
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 56px 20px 4px;
  }

  .back-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    margin-right: 2px;
  }

  .back-btn svg {
    width: 20px; height: 20px;
    fill: none;
    stroke: rgba(0,0,0,0.82);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .badge-wrap {
    width: 34px; height: 34px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .badge-spin {
    position: absolute;
    width: 68px; height: 68px;
    top: -17px; left: -17px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #010B09, #010B09, #010B09, #010B09,
      #010B09, #020E0C, #083D36, #0F6A5E,
      #14A490, #44D4C4, #ffffff,
      #44D4C4, #010B09
    );
    animation: spin 2.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .badge-inner {
    position: absolute;
    top: 2px; left: 2px; right: 2px; bottom: 2px;
    border-radius: 8px;
    background: #EDE8DF;
    display: flex; align-items: center; justify-content: center;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(0,0,0,0.82);
  }

  /* ── CARD HERO ── */
  .card-hero {
    display: flex;
    justify-content: center;
    margin-top: 28px;
    padding: 0 20px;
    position: relative;
  }

  /* Ambient glow */
  .card-glow {
    position: absolute;
    bottom: -20px;
    left: 60px; right: 60px;
    height: 60px;
    border-radius: 100px;
    background: rgba(20,164,144,0.25);
    filter: blur(20px);
    pointer-events: none;
  }

  /* Ring container */
  .ring-wrap {
    width: 352px;
    height: 222px;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 16px 48px rgba(20,164,144,0.38), 0 4px 16px rgba(0,0,0,0.18);
  }

  .ring-spin {
    position: absolute;
    width: 704px; height: 704px;
    top: -241px; left: -176px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #020E0C, #04201C, #083D36,
      #0F6A5E, #14A490, #44D4C4, #ffffff,
      #44D4C4, #14A490, #0F6A5E,
      #083D36, #04201C, #020E0C
    );
    animation: spin 4.5s linear infinite;
  }

  .card-inner {
    position: absolute;
    top: 2px; left: 2px; right: 2px; bottom: 2px;
    border-radius: 16px;
    overflow: hidden;
    background: linear-gradient(135deg, #1a3a34 0%, #0d2b24 40%, #071a15 100%);
  }

  .card-chip {
    position: absolute;
    top: 24px; left: 22px;
    width: 32px; height: 24px;
    border-radius: 4px;
    background: linear-gradient(135deg, #D4A84B, #E8C97A, #B8923E);
    opacity: 0.85;
  }

  .card-logo-text {
    position: absolute;
    top: 22px; right: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.85);
  }

  .card-number {
    position: absolute;
    bottom: 40px; left: 22px;
    font-family: 'Syne Mono', monospace;
    font-size: 15px;
    letter-spacing: 2.5px;
    color: rgba(255,255,255,0.88);
    font-variant-numeric: tabular-nums;
    transition: opacity 0.18s;
  }

  .card-name {
    position: absolute;
    bottom: 18px; left: 22px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.55);
  }

  .card-network {
    position: absolute;
    bottom: 16px; right: 20px;
    display: flex;
  }

  .net-c { width: 22px; height: 22px; border-radius: 50%; opacity: 0.7; }
  .net-c:first-child { background: #E8292A; }
  .net-c:last-child  { background: #F79E1B; margin-left: -8px; }

  .card-specular {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── STATUS ── */
  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    margin-top: 18px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #14A490;
    box-shadow: 0 0 6px rgba(20,164,144,0.7);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .status-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: #14A490;
  }

  /* ── DETAILS PANEL ── */
  .panel {
    margin: 22px 20px 0;
    background: rgba(255,255,255,0.78);
    border: 1px solid rgba(255,255,255,0.92);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(20,164,144,0.08);
    position: relative;
  }

  /* Specular top edge */
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.95);
  }

  .panel-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    cursor: pointer;
  }

  .panel-row:last-child { border-bottom: none; }

  .panel-label {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(0,0,0,0.40);
    text-transform: uppercase;
  }

  .panel-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-value {
    font-family: 'Syne Mono', monospace;
    font-size: 17px;
    color: rgba(0,0,0,0.80);
    letter-spacing: 1.5px;
    font-variant-numeric: tabular-nums;
    transition: opacity 0.18s;
  }

  .reveal-label {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: rgba(0,0,0,0.38);
    transition: color 0.2s;
  }

  .reveal-label.active { color: #14A490; }

  .panel-pair { display: flex; }
  .panel-half {
    flex: 1;
    padding: 14px 18px;
  }
  .panel-half:first-child { border-right: 1px solid rgba(0,0,0,0.07); }

  /* ── ACTIONS ── */
  .actions {
    display: flex;
    gap: 10px;
    padding: 14px 20px 0;
  }

  .btn-dark {
    flex: 1;
    height: 46px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    border: none;
    border-radius: 14px;
    background: #1A1A1A;
    cursor: pointer;
    transition: transform 0.12s;
  }
  .btn-dark:active { transform: scale(0.97); }
  .btn-dark-label {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: #fff;
  }

  .btn-ghost {
    flex: 1;
    height: 46px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    border: 1px solid rgba(0,0,0,0.10);
    border-radius: 14px;
    background: rgba(255,255,255,0.90);
    cursor: pointer;
    transition: transform 0.12s;
  }
  .btn-ghost:active { transform: scale(0.97); }
  .btn-ghost-label {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(0,0,0,0.80);
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: absolute;
    bottom: 20px; left: 20px; right: 20px;
    height: 52px;
  }

  .nav-glow {
    position: absolute;
    top: -10px; left: -10px;
    width: 72px; height: 72px;
    border-radius: 24px;
    background: rgba(20,164,144,0.04);
    box-shadow: 0 3px 18px rgba(20,164,144,0.55);
    pointer-events: none;
  }

  .nav-pill {
    position: absolute;
    top: 0; left: 0;
    width: 52px; height: 52px;
    border-radius: 15px;
    background: linear-gradient(160deg, rgba(255,255,255,0.98) 0%, rgba(218,222,220,0.94) 100%);
    box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    pointer-events: none;
    overflow: hidden;
  }

  .nav-pill::after {
    content: '';
    position: absolute;
    bottom: 5px; left: 13px; right: 13px;
    height: 2px; border-radius: 1px;
    background: #14A490; opacity: 0.55;
  }

  .nav-items {
    position: absolute; inset: 0;
    display: flex; z-index: 2;
  }

  .nav-btn {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; background: none;
  }

  .nav-btn svg {
    width: 22px; height: 22px;
    fill: none; stroke-width: 1.8;
    stroke-linecap: round; stroke-linejoin: round;
    transition: stroke 0.2s, transform 0.2s;
  }

  .nav-btn.active svg { stroke: #0A5C4E; transform: scale(1.2); }
  .nav-btn:not(.active) svg { stroke: rgba(0,0,0,0.28); }
</style>
</head>
<body>

<div class="phone">
  <div class="scroll">

    <!-- Header -->
    <div class="header">
      <div class="back-btn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="badge-wrap">
        <div class="badge-spin"></div>
        <div class="badge-inner">
          <svg width="20" height="20" viewBox="0 0 100 100" fill="none">
            <rect x="10" y="10" width="80" height="80" rx="25" fill="none" stroke="rgba(0,0,0,0.82)" stroke-width="6"/>
            <path d="M35 50 C 35 35, 65 35, 65 50 C 65 65, 35 65, 35 50 M 65 50 L 75 50" fill="none" stroke="rgba(0,0,0,0.82)" stroke-width="6" stroke-linecap="round"/>
            <rect x="45" y="45" width="10" height="10" rx="5" fill="rgba(0,0,0,0.82)"/>
          </svg>
        </div>
      </div>
      <span class="header-title">CARD</span>
    </div>

    <!-- Card Hero -->
    <div class="card-hero">
      <div class="card-glow"></div>
      <div class="ring-wrap">
        <div class="ring-spin"></div>
        <div class="card-inner">
          <div class="card-chip"></div>
          <div class="card-logo-text">LATCH</div>
          <div class="card-number" id="cardNum">•••• •••• •••• 4291</div>
          <div class="card-name">ALBERT EINSTEIN</div>
          <div class="card-network">
            <div class="net-c"></div>
            <div class="net-c"></div>
          </div>
          <div class="card-specular"></div>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-row">
      <div class="status-dot"></div>
      <span class="status-label">ACTIVE</span>
    </div>

    <!-- Details Panel -->
    <div class="panel">
      <div class="panel-row" id="revealRow" onclick="toggleReveal()" style="cursor:pointer">
        <span class="panel-label">Card Details</span>
        <div class="panel-right">
          <span class="reveal-label" id="revealLabel">REVEAL</span>
          <svg id="revealIcon" width="13" height="13" fill="none" stroke="rgba(0,0,0,0.38)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>
      <div class="panel-row">
        <span class="panel-label">Card Number</span>
        <span class="panel-value" id="panelNum">•••• •••• •••• 4291</span>
      </div>
      <div class="panel-pair">
        <div class="panel-half">
          <div class="panel-label" style="margin-bottom:8px">Expiry</div>
          <span class="panel-value" id="panelExp">••/••</span>
        </div>
        <div class="panel-half">
          <div class="panel-label" style="margin-bottom:8px">CVC</div>
          <span class="panel-value" id="panelCvc">•••</span>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-dark">
        <svg width="14" height="14" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M15 12H9"/>
        </svg>
        <span class="btn-dark-label">Apple Wallet</span>
      </button>
      <button class="btn-ghost">
        <svg width="14" height="14" fill="none" stroke="rgba(0,0,0,0.72)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        <span class="btn-ghost-label">FREEZE</span>
      </button>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav" id="nav">
    <div class="nav-glow" id="navGlow"></div>
    <div class="nav-pill" id="navPill"></div>
    <div class="nav-items">
      <button class="nav-btn" onclick="selectTab(0)">
        <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
      </button>
      <button class="nav-btn active" onclick="selectTab(1)">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </button>
      <button class="nav-btn" onclick="selectTab(2)">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.41"/></svg>
      </button>
      <button class="nav-btn" onclick="selectTab(3)">
        <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.2" fill="rgba(0,0,0,0.28)" stroke="none"/><circle cx="12" cy="12" r="1.2" fill="rgba(0,0,0,0.28)" stroke="none"/><circle cx="19" cy="12" r="1.2" fill="rgba(0,0,0,0.28)" stroke="none"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// Reveal
let revealed = false;
function toggleReveal() {
  revealed = !revealed;
  const lbl = document.getElementById('revealLabel');
  lbl.textContent = revealed ? 'HIDE' : 'REVEAL';
  lbl.className = revealed ? 'reveal-label active' : 'reveal-label';

  const panelNum = document.getElementById('panelNum');
  const panelExp = document.getElementById('panelExp');
  const panelCvc = document.getElementById('panelCvc');
  const cardNum  = document.getElementById('cardNum');

  panelNum.style.opacity = '0';
  panelExp.style.opacity = '0';
  panelCvc.style.opacity = '0';
  cardNum.style.opacity  = '0';

  setTimeout(() => {
    if (revealed) {
      panelNum.textContent = '4929 1840 5731 4291';
      panelExp.textContent = '09/27';
      panelCvc.textContent = '384';
      cardNum.textContent  = '4929 1840 5731 4291';
    } else {
      panelNum.textContent = '•••• •••• •••• 4291';
      panelExp.textContent = '••/••';
      panelCvc.textContent = '•••';
      cardNum.textContent  = '•••• •••• •••• 4291';
    }
    panelNum.style.opacity = '1';
    panelExp.style.opacity = '1';
    panelCvc.style.opacity = '1';
    cardNum.style.opacity  = '1';
  }, 120);
}

// Nav pill
class Spring {
  constructor(k=280,d=28,m=0.8){this.k=k;this.d=d;this.m=m;this.pos=0;this.vel=0;this.target=0;this._raf=null;}
  to(t){this.target=t;if(!this._raf)this._raf=requestAnimationFrame(()=>this._step());}
  _step(){this._raf=null;const dt=1/60;const F=-this.k*(this.pos-this.target)-this.d*this.vel;this.vel+=(F/this.m)*dt;this.pos+=this.vel*dt;this._apply();if(Math.abs(this.vel)>0.1||Math.abs(this.pos-this.target)>0.1)this._raf=requestAnimationFrame(()=>this._step());else{this.pos=this.target;this._apply();}}
  _apply(){}
}

const nav=document.getElementById('nav'),pill=document.getElementById('navPill'),glow=document.getElementById('navGlow');
const btns=document.querySelectorAll('.nav-btn');
const sp=new Spring(280,28,0.8);
sp._apply=()=>{pill.style.transform=`translateX(${sp.pos}px)`;glow.style.transform=`translateX(${sp.pos}px)`;};
function getX(i){const w=nav.offsetWidth,s=w/4;return i*s+s/2-26;}
function selectTab(i){btns.forEach((b,j)=>b.classList.toggle('active',j===i));sp.to(getX(i));}
window.addEventListener('load',()=>{const x=getX(1);sp.pos=x;pill.style.transform=`translateX(${x}px)`;glow.style.transform=`translateX(${x}px)`;});
</script>
</body>
</html>
