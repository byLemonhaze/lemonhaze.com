<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100vw;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      font-family: 'JetBrains Mono', monospace;
      color: #ffffff;
      scroll-behavior: smooth;
      background-color: #222;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    @media screen and (max-width: 768px) {
      body {
        min-height: 100vh;
        width: 100vw;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
      }
      html {
        min-height: 100vh;
        overflow-x: hidden;
      }
    }


    .container {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 2rem 2.5rem;
      flex: 1;
    }

    .back-link {
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      display: inline-block;
      margin-bottom: 0;
      position: relative;
      transition: color 0.25s ease;
    }

    .back-link::after {
      content: "";
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.6);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.18s ease;
    }

    .back-link:hover { color: #f9f3f6; }
    .back-link:hover::after { transform: scaleX(1); }

    .top-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 1.5rem 0 2rem;
    }

    @media (max-width: 768px) {
      .top-links { gap: 12px; margin: 6px 0 8px; }
      .back-link { font-size: 12px; }
    }

    .title-section {
      text-align: center;
      margin-bottom: 2.8rem;
    }

    .title-section h1 {
      font-size: 2rem;
      font-weight: bold;
      color: #ffffff;
    }

    .title-section .cursive {
      font-family: 'Dancing Script', cursive;
      font-size: 1.2rem;
      margin-top: 0.5rem;
      color: #ffffff;
    }

    .collection-description {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      line-height: 1.5;
      opacity: 0.95;
      color: #ffffff;
      max-width: 42rem;
      margin-left: auto;
      margin-right: auto;
      white-space: normal;
    }

    .collection-meta {
      margin-top: 0.25rem;
      font-size: 0.8rem;
      opacity: 0.8;
      color: #ffffff;
    }

    .gallery {
      display: grid;
      gap: 1.25rem;
      justify-items: center;
      width: 100%;
      margin: 0 auto;
    }


    .frame {
      position: relative;
      padding: 0.75rem;
      text-align: center;
      transition: transform 0.2s ease;
      cursor: pointer;
      width: 100%;
      max-width: none;
    }
    /* Larger cards for tiny collections (1–4 works) */
    .gallery[data-count="1"] .frame,
    .gallery[data-count="2"] .frame,
    .gallery[data-count="3"] .frame {
      max-width: 360px;
    }

    .gallery[data-count="4"] .frame {
      max-width: 320px;
    }

    .gallery.dense-grid {
      gap: 0.9rem;
    }

    .frame:hover {
      transform: scale(1.005); /* much less movement */
    }

    .frame .preview-container {
      position: relative;
      width: 100%;
      padding-top: 100%; /* Force square aspect ratio */
      border-radius: 4px;
    }

    .frame img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border: none;
      pointer-events: none;
      image-rendering: auto;
      filter: drop-shadow(0 0 1px rgba(255, 255, 255, 0.9)) drop-shadow(0 0 3px rgba(232, 220, 180, 0.7)) drop-shadow(0 0 6px rgba(249, 243, 246, 0.3));
      transition: filter 0.3s ease, transform 0.2s ease;
    }

    .frame:hover img {
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 1)) drop-shadow(0 0 5px rgba(232, 220, 180, 0.8)) drop-shadow(0 0 8px rgba(249, 243, 246, 0.5));
    }

    @keyframes pulse-glow {
      0% { filter: drop-shadow(0 0 1px rgba(255, 255, 255, 0.9)) drop-shadow(0 0 3px rgba(232, 220, 180, 0.7)) drop-shadow(0 0 6px rgba(249, 243, 246, 0.3)); }
      50% { filter: drop-shadow(0 0 1.3px rgba(255, 255, 255, 0.95)) drop-shadow(0 0 3.5px rgba(232, 220, 180, 0.75)) drop-shadow(0 0 7px rgba(249, 243, 246, 0.35)); }
      100% { filter: drop-shadow(0 0 1px rgba(255, 255, 255, 0.9)) drop-shadow(0 0 3px rgba(232, 220, 180, 0.7)) drop-shadow(0 0 6px rgba(249, 243, 246, 0.3)); }
    }

    .frame .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      font-size: 0.65rem;
      text-align: center;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .frame p {
      font-size: 0.8rem;
      margin-top: 0.5rem;
      color: #ffffff;
    }

    .gallery p {
      color: #ffffff;
      text-align: center;
    }

    /* Coded backgrounds only */
    body.bg-black {
      background-color: #0d0d0d !important;
      background-image: none !important;
    }

    body.bg-grid {
      background-color: #222 !important;
      background-image: none !important;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const gallery = document.getElementById('gallery');
      const title = document.querySelector('title');
      const h1 = document.querySelector('h1');

      // Get collection name from URL parameter
      const params = new URLSearchParams(window.location.search);
      const collectionName = decodeURIComponent(params.get('name') || '');
      // Author line exception for BEST BEFORE
      const authorLine = document.getElementById('author-line');
      if (authorLine && collectionName === 'BEST BEFORE') {
        authorLine.innerHTML = `
          <div>by Lemonhaze</div>
          <div>x</div>
          <div>ORDINALLY</div>
        `;
      }
      // Show Analytics button only for BEST BEFORE
      const analyticsLink = document.getElementById('analytics-link');
      if (analyticsLink && collectionName === 'BEST BEFORE') {
        analyticsLink.style.display = 'inline-block';
      }
      if (!collectionName) {
        gallery.innerHTML = '<p>No collection specified.</p>';
        title.textContent = 'Collection Not Found';
        h1.textContent = 'Collection Not Found';
        return;
      }

      // Set dynamic title and header
      title.textContent = collectionName;
      h1.textContent = collectionName;
      // Set collection description under the title
      const descEl = document.getElementById('collection-description');
      if (descEl) {
        descEl.textContent = collectionDescriptions[collectionName] || 'ART BY LEMONHAZE';
      }

      // Fetch and filter provenance data
      fetch(provenanceUrl)
        .then(response => {
          if (!response.ok) throw new Error('Failed to fetch provenance.json');
          return response.json();
        })
        .then(data => {
          let collectionItems = data.filter(item => item.collection === collectionName);

          // Manufactured: show ALL items visually (422), but count remains 420
          if (collectionName === 'Manufactured') {
            const parents = collectionItems.filter(item =>
              (item.name || '').toLowerCase().includes('parent')
            );

            const works = collectionItems.filter(item =>
              !(item.name || '').toLowerCase().includes('parent')
            );

            // Do NOT slice — show everything
            collectionItems = [...parents, ...works];
          }

          // Smart grid column logic
          function computeColumns(count) {
            const w = window.innerWidth;

            if (w >= 1800) {
              if (count <= 4) return count;
              if (count <= 16) return 6;
              if (count <= 36) return 8;
              return 10;
            }

            if (w >= 1400) {
              if (count <= 4) return count;
              if (count <= 16) return 5;
              if (count <= 36) return 7;
              return 9;
            }

            if (w >= 1024) {
              if (count <= 4) return count;
              if (count <= 16) return 4;
              if (count <= 36) return 6;
              return 8;
            }

            if (w >= 768) {
              return Math.min(3, count);
            }

            return 1; // mobile handled elsewhere
          }

          const cols = computeColumns(collectionItems.length);
          gallery.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
          window.addEventListener('resize', () => {
            const newCols = computeColumns(collectionItems.length);
            gallery.style.gridTemplateColumns = `repeat(${newCols}, 1fr)`;
          });
          // For very large collections, use a denser grid
          if (collectionItems.length >= 40) {
            gallery.classList.add('dense-grid');
          }
          // Update the meta line: "X works • Inscribed YEAR"
          const metaEl = document.getElementById('collection-meta');
          if (metaEl) {
            const year = yearMap[collectionName] || '';
            const displayCount =
              collectionName === 'Manufactured' ? 420 : collectionItems.length;

            const parts = [];
            if (displayCount) parts.push(`${displayCount} work${displayCount !== 1 ? 's' : ''}`);
            if (year) parts.push(`Inscribed ${year}`);
            metaEl.textContent = parts.join(' • ');
          }
          if (collectionItems.length === 0) {
            gallery.innerHTML = '<p>No artworks found for this collection.</p>';
            return;
          }

          // Mobile-only: show vertical slideshow instead of grid
          const isMobile = window.innerWidth <= 768;
          if (isMobile) {
            gallery.classList.add('mobile-slideshow');
            gallery.innerHTML = '';

            const fragment = document.createDocumentFragment();
            collectionItems.forEach(({ id, name, artwork_type }) => {
              // Determine extension
              let finalId = id;
              let finalExt = artwork_type === 'JPEG' ? 'jpg' : artwork_type === 'WEBP' ? 'webp' : 'png';
              let modalId = id;

              // Special overrides (preserve your existing exceptions)
              if (
                collectionName === 'Cypherville' &&
                id === '0c57ce6325d8da6242488d453c13bac0e1e1eaca6a5b3bf4078a6bdd6768d49di0'
              ) {
                finalId = 'luckyseven';
                finalExt = 'png';
              }
              if (
                collectionName === 'Portrait 2490' &&
                id === '87a923ac2114f0331cf75c65a5085baeda31993413d7d1b61a3f4ce7f73345cci0'
              ) {
                finalId = 'Fax';
                finalExt = 'png';
              }

              const slide = document.createElement('div');
              slide.className = 'slide';

              const img = document.createElement('img');
              img.className = 'slideshow-image';
              img.src = `https://cdn.lemonhaze.com/assets/assets/${finalId}.${finalExt}`;
              img.alt = name;
              img.loading = 'lazy';
              img.addEventListener('click', () => {
                try {
                  sessionStorage.setItem('lastYear', yearMap[collectionName] || '2023');
                  sessionStorage.setItem('lastCollection', collectionName);
                  sessionStorage.setItem('lastScroll', window.scrollY);
                  const bgStyle = getComputedStyle(document.body).backgroundImage;
                  if (bgStyle) sessionStorage.setItem('bgImage', bgStyle);
                  const isBlack = document.body.classList.contains('plain-black-bg');
                  localStorage.setItem('lemonhazeBg', isBlack ? 'black' : document.body.style.backgroundImage);
                } catch (e) {}
                window.location.href = `/modal.html?id=${modalId}`;
              });

              const cap = document.createElement('div');
              cap.className = 'caption';
              cap.textContent = name;

              slide.appendChild(img);
              slide.appendChild(cap);
              fragment.appendChild(slide);
            });

            gallery.appendChild(fragment);
            // Precisely size each slide's image to avoid cropping for any aspect ratio
            const sizeSlides = () => {
              const rect = gallery.getBoundingClientRect();
              const avail = Math.max(320, window.innerHeight - rect.top); // available height for the scroller

              // Make the gallery the scroller and each slide fill its viewport
              gallery.style.height = avail + 'px';
              gallery.style.overflowY = 'auto';
              gallery.style.webkitOverflowScrolling = 'touch';

              const slidesEls = gallery.querySelectorAll('.slide');
              slidesEls.forEach(slide => {
                slide.style.minHeight = avail + 'px';
                const img = slide.querySelector('.slideshow-image');
                const cap = slide.querySelector('.caption');
                const capH = cap ? cap.offsetHeight : 0;
                const slideStyle = getComputedStyle(slide);
                const padTop = parseFloat(slideStyle.paddingTop) || 0;
                const padBottom = parseFloat(slideStyle.paddingBottom) || 0;
                // Leave a small safety margin (12px)
                const maxH = Math.max(120, avail - capH - padTop - padBottom - 12);
                img.style.maxHeight = maxH + 'px';
              });
            };

            // Run once images have at least started loading, then on resize/orientation
            requestAnimationFrame(sizeSlides);
            window.addEventListener('resize', sizeSlides);
            window.addEventListener('orientationchange', sizeSlides);
            // Dynamically size gallery to fill the remaining viewport below the header
            const adjustHeights = () => {
              // Distance from top of viewport to top of gallery
              const rect = gallery.getBoundingClientRect();
              const top = rect.top; // px relative to viewport
              const avail = Math.max(320, window.innerHeight - top); // clamp to avoid zero
              // Set the gallery height so it becomes its own scroll container
              gallery.style.height = avail + 'px';
              gallery.style.overflowY = 'auto';
              gallery.style.webkitOverflowScrolling = 'touch';
              // Make each slide fill this internal viewport so images center and never crop
              const slidesEls = gallery.querySelectorAll('.slide');
              slidesEls.forEach(s => { s.style.minHeight = avail + 'px'; });
            };
            // Do an initial pass after layout, and on resize/orientation changes
            requestAnimationFrame(adjustHeights);
            window.addEventListener('resize', adjustHeights);
            window.addEventListener('orientationchange', adjustHeights);
            // bail out so the desktop-grid logic below does not run on mobile
            return;
          }

          // Special logic for 422 items (insert first/last as a top row)
          if (collectionItems.length === 422) {
            // Remove first and last items
            const specialLast = collectionItems.pop();
            const specialFirst = collectionItems.shift();

            // Create the pair row
            const topRow = document.createElement("div");
            topRow.className = "pair-row";

            [specialFirst, specialLast].forEach(({ id, name, artwork_type }) => {
              const div = document.createElement('div');
              div.className = 'frame pair';
              const container = document.createElement('div');
              container.className = 'preview-container';
              const preview = document.createElement('img');
              let finalExt = artwork_type === "JPEG" ? "jpg" : artwork_type === "WEBP" ? "webp" : "png";
              preview.src = `https://cdn.lemonhaze.com/assets/assets/${id}.${finalExt}`;
              preview.alt = name;
              container.appendChild(preview);
              div.appendChild(container);
              const label = document.createElement('p');
              label.textContent = name;
              div.appendChild(label);
              topRow.appendChild(div);
            });
            gallery.appendChild(topRow);
          }

          // Render the remaining artworks
          const rowDiv = document.createDocumentFragment();
          collectionItems.forEach(({ id, name, artwork_type }) => {
            // Determine extension
            let finalId = id;
            let finalExt = artwork_type === "JPEG" ? "jpg" : artwork_type === "WEBP" ? "webp" : "png";
            let modalId = id;
            // Special override for Cypherville luckyseven by id
            if (
              collectionName === "Cypherville" &&
              id === "0c57ce6325d8da6242488d453c13bac0e1e1eaca6a5b3bf4078a6bdd6768d49di0"
            ) {
              finalId = "luckyseven";
              finalExt = "png";
            }
            // Special override for Portrait 2490 Fax
            if (
              collectionName === "Portrait 2490" &&
              id === "87a923ac2114f0331cf75c65a5085baeda31993413d7d1b61a3f4ce7f73345cci0"
            ) {
              finalId = "Fax";
              finalExt = "png";
            }

            const div = document.createElement('div');
            div.className = 'frame';

            const container = document.createElement('div');
            container.className = 'preview-container';

            const loadingOverlay = document.createElement('div');
            loadingOverlay.className = 'loading-overlay';
            loadingOverlay.innerHTML = `
              <div>
                <div class="font-bold">LOADING...</div>
                <div class="opacity-80 text-[0.5rem]">Please wait while the artwork renders</div>
              </div>
            `;
            container.appendChild(loadingOverlay);

            const preview = document.createElement('img');
            preview.src = `https://cdn.lemonhaze.com/assets/assets/${finalId}.${finalExt}`;
            preview.alt = name;
            preview.title = name;
            preview.loading = 'lazy';
            preview.setAttribute('aria-hidden', 'true');
            container.appendChild(preview);

            div.appendChild(container);

            const label = document.createElement('p');
            label.textContent = name;
            div.appendChild(label);

            preview.addEventListener('load', () => {
              if (preview.naturalWidth <= 100 || preview.naturalHeight <= 100) {
                preview.style.imageRendering = 'pixelated';
              }
              loadingOverlay.remove();
            });
            preview.addEventListener('error', () => {
              console.error(`Failed to load image: ${finalId}.${finalExt}`);
              preview.src = 'https://cdn.lemonhaze.com/assets/assets/placeholder.png';
            });

            container.onclick = () => {
              try {
                sessionStorage.setItem('lastYear', yearMap[collectionName] || '2023');
                sessionStorage.setItem('lastCollection', collectionName);
                sessionStorage.setItem('lastScroll', window.scrollY);
                const bgStyle = getComputedStyle(document.body).backgroundImage;
                if (bgStyle) sessionStorage.setItem('bgImage', bgStyle);
                const isBlack = document.body.classList.contains('plain-black-bg');
                localStorage.setItem('lemonhazeBg', isBlack ? 'black' : document.body.style.backgroundImage);
              } catch (e) {}
              window.location.href = `/modal.html?id=${modalId}`;
            };

            rowDiv.appendChild(div);
          });
          gallery.appendChild(rowDiv);
        })
        .catch(error => {
          console.error('Error loading provenance:', error);
          gallery.innerHTML = '<p>Failed to load collection data.</p>';
        });

      // Always use grey background, no toggle.
      document.body.classList.remove('bg-black');
      document.body.classList.add('bg-grid');
    });
  </script>
</body>
</html>
