<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lemonhaze</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Fragment+Mono&display=block"
    rel="stylesheet" />
  <style>
    body {
      background-color: #000 !important;
      color: white !important;
    }

    a,
    a:visited,
    a:hover,
    a:active {
      color: white !important;
      text-decoration: none;
    }
  </style>
</head>

<body class="bg-black text-white h-screen overflow-hidden flex selection:bg-white/20"
  style="background-color: #000 !important;">

  <!-- Mobile Menu Backdrop -->
  <div id="mobile-backdrop" class="fixed inset-0 bg-black/80 z-10 hidden md:hidden"></div>

  <!-- Left Sidebar / Navigation -->
  <aside id="sidebar"
    class="w-80 h-full border-r border-white/10 flex flex-col z-50 transition-transform duration-300 md:translate-x-0 -translate-x-full fixed md:relative bg-[#080808]">
    <!-- Header -->
    <a href="/" class="sidebar-expand-content p-6 border-b border-white/10 block hover:bg-white/[0.02] group"
      style="color: white; text-decoration: none;">
      <h1 class="text-lg font-bold uppercase tracking-[0.22em] transition-colors duration-200 origin-left">
        Lemonhaze</h1>
      <p class="text-[10px] text-white/40 mt-1 font-mono tracking-[0.2em] uppercase"
        style="color: rgba(255, 255, 255, 0.4);">
        &lt;!-- Artist & Coureur de Bois --&gt;</p>
    </a>

    <!-- Navigation Links -->
    <nav class="sidebar-expand-content flex-1 overflow-y-auto p-4 space-y-8 scrollbar-hide">
      <!-- Top Section (Marketplace, About, Socials) -->
      <div id="top-nav-section" class="space-y-1">
        <!-- Marketplace injected here -->
        <!-- About/Socials injected here -->
      </div>

      <!-- Collections by Year -->
      <div id="collections-nav" class="space-y-6">
        <!-- Populated by JS -->
      </div>
    </nav>

    <!-- Footer / Signature -->
    <div class="sidebar-expand-content p-6 border-t border-white/5">
      <p class="text-[9px] text-white/30 font-mono leading-tight">© by Lemonhaze 2026<br>All works inscribed on Bitcoin
      </p>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 h-full relative flex flex-col bg-[#060606]">

    <!-- Top Bar (Mobile Menu Toggle & Info) -->
    <header
      class="min-h-[4rem] py-3 border-b border-white/10 flex items-center justify-between px-6 md:px-10 shrink-0 bg-[#070707] z-10 transition-all duration-300">
      <button id="menu-toggle" class="md:hidden p-2 text-white/70 hover:text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m4 18h16" />
        </svg>
      </button>

      <div class="flex flex-col flex-1 mx-4">
        <div class="flex items-center gap-2">
          <h2 id="current-view-title" class="text-base md:text-lg font-bold tracking-[0.18em] uppercase"></h2>
          <button id="refresh-btn"
            class="p-1.5 text-white/40 hover:text-white hover:rotate-180 transition-all duration-300 hidden"
            title="Refresh collection">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </button>
        </div>
        <div id="current-view-meta" class="text-xs text-white/40 font-mono"></div>
      </div>

      <div class="w-6"><!-- Balance --></div>
    </header>

    <!-- Content Scroll Area -->
    <div id="content-area" class="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
      <div id="gallery-grid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 mb-20">
        <!-- Artworks injected here -->
      </div>

      <!-- Loading State -->
      <div id="loading-indicator"
        class="hidden absolute inset-0 flex items-center justify-center bg-black/80 z-50">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div>
      </div>
    </div>

  </main>

  <!-- Modal / Showroom Overlay -->
  <div id="modal-overlay"
    class="fixed inset-0 z-50 bg-black hidden opacity-0 transition-opacity duration-300 flex flex-col md:flex-row overflow-hidden">

    <!-- Left Panel: Artwork (with breathing room) -->
    <div class="flex-1 flex items-center justify-center relative bg-[#050505] min-h-[50vw] md:min-h-0">
      <iframe id="modal-iframe"
        class="absolute inset-[5%] w-[90%] h-[90%] hidden"
        frameborder="0"></iframe>
      <img id="modal-image"
        class="w-auto h-auto max-w-[88%] max-h-[50vh] md:max-h-[82vh] object-contain hidden" />

      <!-- Raw Source Overlay -->
      <div id="raw-html-container"
        class="hidden absolute inset-0 bg-[#050505] z-50 p-6 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-4 pb-2 border-b border-white/8">
          <span class="text-[9px] font-mono uppercase tracking-[0.25em] text-white/30">Raw Source</span>
          <button id="close-raw-html" class="text-[9px] font-mono uppercase tracking-[0.2em] text-white/30 hover:text-white transition-colors">Close</button>
        </div>
        <pre id="raw-html-content" class="flex-1 overflow-auto text-[10px] font-mono text-white/50 select-all leading-relaxed"></pre>
      </div>
    </div>

    <!-- Right Panel: Info -->
    <div class="w-full md:w-[340px] shrink-0 flex flex-col bg-black border-t md:border-t-0 md:border-l border-white/8 relative overflow-y-auto">
      <button id="modal-close"
        class="absolute top-4 right-4 p-1 text-white/25 hover:text-white transition-colors z-[60]">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/>
        </svg>
      </button>

      <div class="p-6 md:p-8 pt-10 md:pt-10 flex flex-col gap-0 min-h-full">

        <h3 id="modal-title" class="text-lg md:text-xl font-mono uppercase tracking-[0.12em] text-white mb-4 pr-6 leading-tight"></h3>

        <!-- Action row -->
        <div id="modal-actions" class="flex flex-wrap items-center gap-x-2 gap-y-1.5 pb-5 border-b border-white/8 mb-5">
          <!-- Injected by JS -->
        </div>

        <!-- Metadata -->
        <div id="modal-metadata" class="flex-1">
          <!-- Injected by JS -->
        </div>

      </div>
    </div>

  </div>

  <!-- About / Text Overlay -->
  <div id="about-overlay"
    class="fixed inset-0 z-50 bg-black/85 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
    <div id="about-wrapper" class="absolute inset-0"></div> <!-- Click trap to close -->
    <div class="surface max-w-4xl w-full p-8 md:p-12 relative z-10 max-h-[90vh] overflow-y-auto">
      <button id="about-close"
        class="absolute top-4 right-4 p-1 text-white/40 hover:text-white transition-colors">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/>
        </svg>
      </button>
      <h2 id="about-title" class="text-base font-bold tracking-[0.18em] uppercase mb-6 text-white/90"></h2>
      <div id="about-content" class="text-sm md:text-base selection:bg-white/20">
        <!-- Injected Text -->
      </div>
    </div>
  </div>

  <!-- External Site Overlay -->
  <div id="site-overlay" class="fixed inset-0 z-[70] bg-black hidden flex flex-col">
    <div class="flex items-center justify-between px-6 h-11 border-b border-white/10 shrink-0">
      <span id="site-overlay-label" class="text-[9px] font-mono uppercase tracking-[0.28em] text-white/30"></span>
      <button id="site-overlay-close" class="text-[9px] font-mono uppercase tracking-[0.22em] text-white/35 hover:text-white transition-colors duration-200">← Lemonhaze</button>
    </div>
    <iframe id="site-overlay-iframe" class="flex-1 w-full" frameborder="0"></iframe>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
